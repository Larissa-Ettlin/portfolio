backend:
  name: git-gateway
  repo: Larissa-Ettlin/portfolio
  branch: main
  identity_url: https://auth.decapbridge.com/sites/e6222ea6-6479-40ec-822f-7a1da5ca4d90
  gateway_url: https://gateway.decapbridge.com

media_folder: "public/uploads"
public_folder: "/uploads"

media_library:
  name: uploadcare

# Optional
commit_messages:
  create: 'Create {{collection}} "{{slug}}"'
  update: 'Update {{collection}} "{{slug}}"'
  delete: 'Delete {{collection}} "{{slug}}"'
  uploadMedia: 'Upload "{{path}}"'
  deleteMedia: 'Delete "{{path}}"'

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://Larissa-Ettlin.github.io/portfolio

collections:
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    identifier_field: "name"
    slug: "{{slug}}"

    fields:
      - name: "name"
        label: "Project Name"
        widget: "string"
        hint: "Pflichtfeld. Das ist der Titel des Projekts."

      - name: "cover"
        label: "Cover Image"
        widget: "image"
        hint: "Pflichtfeld. Dieses Bild erscheint in der Projektübersicht."

      - name: "description"
        label: "Short Description"
        widget: "text"
        required: false
        default: ""

      - name: "date"
        label: "Date"
        widget: "datetime"
        required: false
        default: "{{now}}"

      - name: "coverAlt"
        label: "Cover Alt Text"
        widget: "string"
        required: false
        default: ""
        hint: "Optional. Falls leer, wird automatisch der Projektname verwendet."

      - name: "tags"
        label: "Tags"
        widget: "list"
        required: false
        field:
          label: "Tag"
          name: "tag"
          widget: "string"

      - name: "draft"
        label: "Draft"
        widget: "boolean"
        default: false
        required: false

      - name: "body"
        label: "Content"
        widget: "markdown"
        required: false
        default: ""

  - name: "site_content"
    label: "Site Content"
    editor:
      preview: false
    files:
      - name: "settings"
        label: "Homepage & Settings"
        file: "src/config/site.json"
        fields:
          - label: "Site"
            name: "site"
            widget: "object"
            fields:
              - label: "Site URL"
                name: "url"
                widget: "string"
                required: false
              - label: "Site Name"
                name: "name"
                widget: "string"
                required: false
              - label: "Browser Tab Title"
                name: "browserTitle"
                widget: "string"
                required: false

          - label: "Company"
            name: "company"
            widget: "object"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Logo URL", name: "logo", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "string", required: false }
              - label: "Long Description"
                name: "longDescription"
                widget: "text"
                required: false
              - label: "Detailed Description"
                name: "detailedDescription"
                widget: "markdown"
                required: false
              - label: "Footer Text"
                name: "footerText"
                widget: "text"
                required: false
              - label: "Copyright"
                name: "copyright"
                widget: "string"
                required: false
              - label: "Status"
                name: "status"
                widget: "object"
                fields:
                  - { label: "Show Status Block", name: "show", widget: "boolean", required: false, default: true }
                  - { label: "Available", name: "available", widget: "boolean", required: false, default: false }
                  - { label: "Status Text", name: "text", widget: "string", required: false }
              - label: "Specialties"
                name: "specialties"
                widget: "list"
                required: false
                field: { label: "Specialty", name: "specialty", widget: "string" }
              - label: "Technologies"
                name: "technologies"
                widget: "list"
                required: false
                field: { label: "Technology", name: "technology", widget: "string" }

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - label: "Book Call"
                name: "bookCall"
                widget: "object"
                fields:
                  - { label: "Show Button", name: "enabled", widget: "boolean", required: false, default: true }
                  - { label: "Text", name: "text", widget: "string", required: false }
                  - { label: "URL", name: "url", widget: "string", required: false }
              - label: "Chat"
                name: "chat"
                widget: "object"
                fields:
                  - { label: "Show Button", name: "enabled", widget: "boolean", required: false, default: true }
                  - { label: "Text", name: "text", widget: "string", required: false }
                  - { label: "URL", name: "url", widget: "string", required: false }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
              - { label: "GitHub", name: "github", widget: "string", required: false }
              - { label: "Dribbble", name: "dribbble", widget: "string", required: false }
              - { label: "Twitter", name: "twitter", widget: "string", required: false }
              - { label: "Instagram", name: "instagram", widget: "string", required: false }
              - { label: "YouTube", name: "youtube", widget: "string", required: false }
              - { label: "Behance", name: "behance", widget: "string", required: false }
              - { label: "Figma", name: "figma", widget: "string", required: false }
              - { label: "Medium", name: "medium", widget: "string", required: false }

          - label: "Experience"
            name: "experience"
            widget: "list"
            required: false
            summary: "{{fields.company}}"
            fields:
              - { label: "Year", name: "year", widget: "string", required: false }
              - { label: "Company", name: "company", widget: "string", required: false }
              - { label: "Role", name: "type", widget: "string", required: false }
              - { label: "Logo URL", name: "logo", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }

          - label: "Projects Settings"
            name: "projects"
            widget: "object"
            fields:
              - label: "Grid Columns"
                name: "gridColumns"
                widget: "number"
                value_type: "int"
                min: 1
                max: 6
                required: false

          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            required: false
            fields:
              - { label: "Text", name: "text", widget: "text", required: false }
              - { label: "Author", name: "author", widget: "string", required: false }
              - { label: "Company", name: "company", widget: "string", required: false }
