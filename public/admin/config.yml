backend:
  name: git-gateway
  repo: Larissa-Ettlin/portfolio
  branch: main
  identity_url: https://auth.decapbridge.com/sites/e6222ea6-6479-40ec-822f-7a1da5ca4d90
  gateway_url: https://gateway.decapbridge.com

media_folder: "public/uploads"
public_folder: "/portfolio/uploads"

media_library:
  name: uploadcare

# Optional
commit_messages:
  create: 'Create {{collection}} "{{slug}}"'
  update: 'Update {{collection}} "{{slug}}"'
  delete: 'Delete {{collection}} "{{slug}}"'
  uploadMedia: 'Upload "{{path}}"'
  deleteMedia: 'Delete "{{path}}"'

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://Larissa-Ettlin.github.io/portfolio

collections:
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    identifier_field: "name"
    slug: "{{slug}}"

    fields:
      - label: "Project Name"
        name: "name"
        widget: "string"

      - label: "Description"
        name: "description"
        widget: "text"

      - label: "Date"
        name: "date"
        widget: "datetime"

      - label: "Cover Image"
        name: "cover"
        widget: "image"

      - label: "Cover Alt Text"
        name: "coverAlt"
        widget: "string"

      - label: "Logo"
        name: "logo"
        widget: "object"
        fields:
          - label: "Logo Image"
            name: "image"
            widget: "image"

          - label: "Fallback"
            name: "fallback"
            widget: "object"
            fields:
              - label: "Fallback Letter"
                name: "text"
                widget: "string"
                default: "P"
                pattern: ["^.$", "Please enter exactly one character."]

              - label: "Fallback Background Color"
                name: "bgColor"
                widget: "select"
                default: "bg-neutral-500"
                options:
                  - "bg-neutral-500"
                  - "bg-stone-500"
                  - "bg-zinc-500"
                  - "bg-slate-500"
                  - "bg-red-500"
                  - "bg-orange-500"
                  - "bg-yellow-500"
                  - "bg-green-500"
                  - "bg-blue-500"
                  - "bg-purple-500"
                  - "bg-pink-500"

      - label: "Case Study"
        name: "caseStudy"
        widget: "object"
        fields:
          - label: "Challenge"
            name: "challenge"
            widget: "text"

          - label: "Solution"
            name: "solution"
            widget: "text"

          - label: "Results"
            name: "results"
            widget: "list"
            field:
              label: "Result"
              name: "result"
              widget: "string"

          - label: "Links"
            name: "links"
            widget: "list"
            required: false
            fields:
              - label: "Link Text"
                name: "text"
                widget: "string"

              - label: "URL"
                name: "url"
                widget: "string"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field:
          label: "Tag"
          name: "tag"
          widget: "string"

      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        required: false

      - label: "Content"
        name: "body"
        widget: "markdown"
